<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Message</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 480px;
            margin: 20px auto;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        .message {
            color: #333;
            line-height: 1.5;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .contact {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            border-left: 3px solid #2c7da0;
        }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">📋 Update</div>
    <div class="message">
        Hello,<br><br>
        We noticed a recent login from a new device. If this was you, no further action is needed.
        If you didn't recognize this activity, please reach out to our support team.
    </div>
    <div class="contact">
        📞 Support: <strong>+1 (970) 303-2610</strong><br>
        <span style="font-size: 12px; color: #666;">Mon-Fri, 9am - 6pm ET</span>
    </div>
    <div class="footer">
        This is an automated message. No reply needed.
    </div>
</div>
</body>
</html>
