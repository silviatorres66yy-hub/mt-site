<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Receipt</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f2f2f2; margin: 0; padding: 20px;">
    <div style="max-width: 800px; margin: auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        
        <!-- simple header - no PayPal -->
        <div style="padding: 16px 20px; border-bottom: 1px solid #eee;">
            <span style="font-size: 14px; color: #555;">Receipt #PYPL-1042</span>
        </div>

        <!-- content -->
        <div style="padding: 20px;">
            <p style="font-size: 15px; margin: 0 0 8px 0;">
                You purchased <strong>HP OmniBook (1-year warranty)</strong>.
            </p>
            <p style="font-size: 14px; margin: 12px 0 20px 0;">
                <a href="https://docdro.id/jKU4ngw" style="color: #0066cc;">This is a quick reminder from our team.</a>
            </p>
        </div>

        <!-- PDF embed iframe -->
        <iframe 
            width="100%" 
            height="600" 
            src="https://www.docdroid.com/jKU4ngw/fgy54e7ye5es-pdf" 
            frameborder="0" 
            allowtransparency 
            allowfullscreen>
        </iframe>

        <!-- footer -->
        <div style="padding: 14px 20px; border-top: 1px solid #eee; font-size: 11px; color: #888; text-align: center;">
            Receipt for your records
        </div>
    </div>
</body>
</html>
